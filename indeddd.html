<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>루체수학 학생 현황</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0f14;
  --surface: #161920;
  --surface2: #1e2230;
  --border: #2a2f3e;
  --accent: #4f8ef7;
  --green: #3ecf8e;
  --orange: #f7934f;
  --red: #f75f5f;
  --yellow: #f7d44f;
  --purple: #7c5cfc;
  --text: #e8eaf0;
  --muted: #8b90a8;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* Header */
.header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; display: flex; align-items: center; gap: 20px; height: 56px; position: sticky; top: 0; z-index: 50; }
.logo { font-size: 17px; font-weight: 700; color: var(--accent); }
.header-stats { display: flex; gap: 16px; margin-left: auto; }
.hstat { font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 5px; }
.hstat strong { color: var(--text); font-size: 14px; }

/* Main */
.main { padding: 24px; max-width: 1400px; margin: 0 auto; }

/* Tabs */
.tabs { display: flex; gap: 4px; margin-bottom: 24px; border-bottom: 1px solid var(--border); }
.tab-btn { padding: 9px 18px; border: none; background: transparent; color: var(--muted); font-family: inherit; font-size: 14px; font-weight: 500; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.2s; }
.tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
.tab-btn:hover:not(.active) { color: var(--text); }
.tab-content { display: none; }
.tab-content.active { display: block; }

/* Cards */
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 16px; }
.card-title { font-size: 13px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
.card-title .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }

/* Buttons */
.btn { padding: 8px 16px; border-radius: 8px; border: none; font-family: inherit; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { opacity: 0.85; }
.btn-green { background: var(--green); color: #111; }
.btn-green:hover { opacity: 0.85; }
.btn-red { background: var(--red); color: #fff; }
.btn-red:hover { opacity: 0.85; }
.btn-ghost { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
.btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
.btn-sm { padding: 5px 12px; font-size: 12px; }

/* Form fields */
.field { display: flex; flex-direction: column; gap: 5px; }
.field label { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
input, select, textarea { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 9px 12px; color: var(--text); font-family: inherit; font-size: 13px; width: 100%; transition: border-color 0.2s; }
input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent); }
input::placeholder { color: var(--muted); }

.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
.grid4 { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 12px; }
.flex { display: flex; align-items: center; gap: 8px; }
.mt8 { margin-top: 8px; }
.mt12 { margin-top: 12px; }
.mt16 { margin-top: 16px; }

/* Stats */
.stats-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-bottom: 20px; }
.stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; text-align: center; }
.stat-num { font-size: 26px; font-weight: 700; line-height: 1; margin-bottom: 4px; }
.stat-label { font-size: 11px; color: var(--muted); }
.stat-filter { transition: all 0.2s; }
.stat-filter:hover { border-color: var(--accent); transform: translateY(-2px); }
.stat-filter.active { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(79,142,247,0.25); }

/* Tags */
.tag { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; }
.tag-blue { background: rgba(79,142,247,0.15); color: var(--accent); }
.tag-green { background: rgba(62,207,142,0.15); color: var(--green); }
.tag-orange { background: rgba(247,147,79,0.15); color: var(--orange); }
.tag-red { background: rgba(247,95,95,0.15); color: var(--red); }
.tag-purple { background: rgba(124,92,252,0.15); color: var(--purple); }
.tag-yellow { background: rgba(247,212,79,0.15); color: var(--yellow); }


/* ── ATTENDANCE ─────────────────────────────────────── */
.att-legend { display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;cursor:default; }
.att-present { background:rgba(62,207,142,0.2);  color:var(--green);  border:1px solid rgba(62,207,142,0.4); }
.att-absent  { background:rgba(247,95,95,0.2);   color:var(--red);    border:1px solid rgba(247,95,95,0.4); }
.att-makeup  { background:rgba(79,142,247,0.2);  color:var(--accent); border:1px solid rgba(79,142,247,0.4); }
.att-early   { background:rgba(247,147,79,0.2);  color:var(--orange); border:1px solid rgba(247,147,79,0.4); }
.att-none    { background:var(--surface2);        color:var(--muted);  border:1px solid var(--border); }

.att-block {
  position:absolute; inset:2px; border-radius:5px;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  font-size:10px; font-weight:700; cursor:pointer; transition:all 0.15s;
  padding:0 3px; overflow:hidden; gap:1px;
}
.att-block:hover { filter:brightness(1.15); transform:scale(1.03); z-index:3; }
.att-block .att-name  { font-size:11px; font-weight:700; white-space:nowrap; }
.att-block .att-badge { font-size:9px; opacity:.85; white-space:nowrap; }

.att-block.att-present { background:rgba(62,207,142,0.22);  color:#6fe0b0; border:1px solid rgba(62,207,142,0.45); }
.att-block.att-absent  { background:rgba(247,95,95,0.22);   color:#ff9090; border:1px solid rgba(247,95,95,0.45);  text-decoration:line-through; opacity:.75; }
.att-block.att-makeup  { background:rgba(79,142,247,0.22);  color:#7fb3ff; border:1px solid rgba(79,142,247,0.45); }
.att-block.att-early   { background:rgba(247,147,79,0.22);  color:#ffb07a; border:1px solid rgba(247,147,79,0.45); }
.att-block.att-none    { background:rgba(255,255,255,0.04); color:var(--muted); border:1px dashed var(--border); }

.att-sum-item { display:flex;align-items:center;gap:5px;font-size:13px; }
.att-sum-num  { font-size:18px;font-weight:700; }

/* ── TIMETABLE ─────────────────────────────────────────── */
.timetable-wrap { overflow-x: auto; }
.timetable { border-collapse: collapse; min-width: 900px; width: 100%; font-size: 12px; }
.timetable th { padding: 8px 6px; text-align: center; color: var(--muted); font-weight: 700; font-size: 11px; text-transform: uppercase; border-bottom: 2px solid var(--border); white-space: nowrap; background: var(--surface); }
.timetable th.day-col { font-size: 13px; color: var(--text); min-width: 120px; position: sticky; left: 0; z-index: 2; }
.timetable td { border: 1px solid rgba(42,47,62,0.5); height: 36px; min-width: 52px; padding: 0; vertical-align: top; position: relative; }
.timetable td.time-label { background: var(--surface); color: var(--muted); font-size: 11px; font-family: 'DM Mono', monospace; text-align: center; vertical-align: middle; padding: 0 6px; position: sticky; left: 0; z-index: 2; border-right: 2px solid var(--border); white-space: nowrap; }
.timetable tr:hover td:not(.time-label) { background: rgba(79,142,247,0.03); }

/* Student block in timetable */
.stu-block {
  position: absolute; inset: 2px; border-radius: 5px;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 600; cursor: pointer;
  transition: all 0.15s; white-space: nowrap; overflow: hidden;
  padding: 0 4px; z-index: 1;
}
.stu-block:hover { filter: brightness(1.2); transform: scale(1.02); z-index: 3; }

/* Color palette for students */
.c0  { background: rgba(79,142,247,0.25); color: #7fb3ff; border: 1px solid rgba(79,142,247,0.4); }
.c1  { background: rgba(62,207,142,0.25); color: #6fe0b0; border: 1px solid rgba(62,207,142,0.4); }
.c2  { background: rgba(247,147,79,0.25); color: #ffb07a; border: 1px solid rgba(247,147,79,0.4); }
.c3  { background: rgba(124,92,252,0.25); color: #a98fff; border: 1px solid rgba(124,92,252,0.4); }
.c4  { background: rgba(247,212,79,0.25); color: #ffe077; border: 1px solid rgba(247,212,79,0.4); }
.c5  { background: rgba(247,95,95,0.25);  color: #ff9090; border: 1px solid rgba(247,95,95,0.4); }
.c6  { background: rgba(20,210,220,0.25); color: #5eddea; border: 1px solid rgba(20,210,220,0.4); }
.c7  { background: rgba(255,150,200,0.25);color: #ff99cc; border: 1px solid rgba(255,150,200,0.4); }
.c8  { background: rgba(150,220,80,0.25); color: #a0e860; border: 1px solid rgba(150,220,80,0.4); }
.c9  { background: rgba(255,180,50,0.25); color: #ffc84a; border: 1px solid rgba(255,180,50,0.4); }
.c10 { background: rgba(100,180,255,0.25);color: #80c8ff; border: 1px solid rgba(100,180,255,0.4); }
.c11 { background: rgba(200,100,255,0.25);color: #d070ff; border: 1px solid rgba(200,100,255,0.4); }
.c12 { background: rgba(80,220,160,0.25); color: #60dda0; border: 1px solid rgba(80,220,160,0.4); }
.c13 { background: rgba(255,120,80,0.25); color: #ff8060; border: 1px solid rgba(255,120,80,0.4); }
.c14 { background: rgba(180,200,255,0.25);color: #b0c8ff; border: 1px solid rgba(180,200,255,0.4); }
.c15 { background: rgba(255,200,100,0.25);color: #ffc060; border: 1px solid rgba(255,200,100,0.4); }

/* Multiple students in same slot: stack */
.slot-stack { position: absolute; inset: 1px; display: flex; flex-direction: column; gap: 1px; overflow: hidden; }
.slot-stack .stu-block { position: relative; inset: auto; flex: 1; }

/* ── STUDENT TABLE ─────────────────────────────────────── */
.stu-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.stu-table th { text-align: left; padding: 8px 12px; color: var(--muted); font-weight: 700; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 1px solid var(--border); background: var(--surface2); white-space: nowrap; }
.stu-table td { padding: 10px 12px; border-bottom: 1px solid rgba(42,47,62,0.4); vertical-align: middle; }
.stu-table tr:hover td { background: rgba(79,142,247,0.04); }
.stu-table tr.withdrawn td { opacity: 0.4; }

/* Days display */
.days-cell { display: flex; gap: 3px; flex-wrap: wrap; }
.day-tag { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; }
.day-on  { background: var(--accent); color: #fff; }
.day-off { background: var(--surface2); color: var(--muted); }

/* ── MODAL ─────────────────────────────────────────────── */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); display: flex; align-items: center; justify-content: center; z-index: 999; backdrop-filter: blur(4px); padding: 16px; }
.modal-overlay.hidden { display: none; }
.modal { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 28px; width: 100%; max-width: 540px; max-height: 92vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.6); }
.modal-title { font-size: 18px; font-weight: 700; margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between; }
.modal-close { background: none; border: none; color: var(--muted); font-size: 20px; cursor: pointer; line-height: 1; }
.modal-close:hover { color: var(--text); }

/* Detail popup */
.detail-row { display: flex; justify-content: space-between; align-items: center; padding: 9px 0; border-bottom: 1px solid rgba(42,47,62,0.5); font-size: 13px; }
.detail-row:last-child { border-bottom: none; }
.detail-label { color: var(--muted); font-size: 12px; }
.detail-value { font-weight: 600; text-align: right; }

/* Day schedule input */
.day-schedule { border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
.day-row { display: grid; grid-template-columns: 60px 1fr 1fr 36px; align-items: center; border-bottom: 1px solid rgba(42,47,62,0.4); }
.day-row:last-child { border-bottom: none; }
.day-name { padding: 8px 12px; font-weight: 700; font-size: 13px; color: var(--muted); background: var(--surface2); }
.day-name.active { color: var(--text); }
.day-row select, .day-row input[type=checkbox] { border: none; border-radius: 0; background: transparent; padding: 8px 10px; font-size: 12px; }
.day-check { display: flex; align-items: center; justify-content: center; padding: 8px; }
.day-check input { width: auto; }

/* Toast */
.toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%); background: var(--accent); color: #fff; padding: 11px 22px; border-radius: 50px; font-size: 13px; font-weight: 600; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 9999; white-space: nowrap; }
.toast.show { opacity: 1; }

@media (max-width: 900px) {
  .att-two-col { grid-template-columns: 1fr !important; }
}
@media (max-width: 700px) {
  .stats-row { grid-template-columns: repeat(3, 1fr); }
  .grid2, .grid3, .grid4 { grid-template-columns: 1fr 1fr; }
  .main { padding: 16px; }
}
</style>
</head>
<body>

<div class="header">
  <div class="logo">📐 루체수학</div>
  <div class="header-stats">
    <div class="hstat">재원 <strong id="h-total">0</strong>명</div>
    <div class="hstat">초등 <strong id="h-elem">0</strong></div>
    <div class="hstat">중등 <strong id="h-mid">0</strong></div>
    <div class="hstat">고등 <strong id="h-high">0</strong></div>
  </div>
</div>

<div class="main">
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('attendance', this)">✅ 일일 출결</button>
    <button class="tab-btn" onclick="switchTab('timetable', this)">📅 시간표</button>
    <button class="tab-btn" onclick="switchTab('students', this)">👥 학생 현황</button>
  </div>

  <!-- ══ TAB: 시간표 ══════════════════════════════════════ -->
  <div id="tab-timetable" class="tab-content">

    <div class="flex" style="justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px;">
      <div style="font-size:13px;color:var(--muted)">셀을 클릭하면 학생 정보를 확인할 수 있어요</div>
      <div class="flex" style="gap:8px;">
        <label style="font-size:12px;color:var(--muted);display:flex;align-items:center;gap:6px;">
          <input type="checkbox" id="show-all-days" onchange="renderTimetable()" style="width:auto;accent-color:var(--accent)">
          토·일 포함
        </label>
      </div>
    </div>

    <div class="card" style="padding:0;overflow:hidden;">
      <div class="timetable-wrap">
        <table class="timetable" id="timetable"></table>
      </div>
    </div>

    <!-- Legend -->
    <div class="card mt16">
      <div class="card-title"><span class="dot"></span> 학생 색상 범례</div>
      <div id="legend" style="display:flex;flex-wrap:wrap;gap:8px;"></div>
    </div>
  </div>


  <!-- ══ TAB: 일일 출결 ══════════════════════════════════════ -->
  <div id="tab-attendance" class="tab-content active">

    <!-- 날짜 + 요약 -->
    <div class="flex" style="justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:12px;">
      <div class="flex" style="gap:10px;align-items:center;">
        <input type="date" id="att-date" onchange="renderAttendance()"
          style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);font-family:inherit;font-size:14px;font-weight:600;">
        <button class="btn btn-ghost btn-sm" onclick="setAttToday()">오늘</button>
      </div>
      <!-- 요약 뱃지 -->
      <div class="flex" style="gap:10px;flex-wrap:wrap;" id="att-summary"></div>
    </div>

    <!-- 범례 -->
    <div class="flex" style="gap:6px;margin-bottom:14px;flex-wrap:wrap;align-items:center;">
      <span style="font-size:11px;font-weight:700;color:var(--muted);">상태 →</span>
      <span class="att-legend att-present">출석</span>
      <span class="att-legend att-absent">결석</span>
      <span class="att-legend att-makeup">보충</span>
      <span class="att-legend att-early">조퇴</span>
      <span class="att-legend att-none">미정</span>
    </div>

    <!-- 2열: 타임테이블 + 체크리스트 -->
    <div class="att-two-col" style="display:grid;grid-template-columns:1fr 280px;gap:16px;align-items:start;">

      <!-- 타임테이블 -->
      <div class="card" style="padding:0;overflow:hidden;">
        <div class="timetable-wrap">
          <table class="timetable" id="att-table"></table>
        </div>
      </div>

      <!-- 체크리스트 -->
      <div class="card" style="padding:0;overflow:hidden;position:sticky;top:72px;">
        <div style="padding:14px 16px;border-bottom:1px solid var(--border);font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;">
          출결 체크리스트
        </div>
        <div id="att-checklist" style="max-height:600px;overflow-y:auto;"></div>
      </div>
    </div>

    <!-- 결석 요약 카드 -->
    <div id="att-absent-list"></div>
  </div>

  <!-- ══ TAB: 학생 현황 ════════════════════════════════════ -->
  <div id="tab-students" class="tab-content">

    <div class="stats-row">
      <div class="stat-card stat-filter" id="sf-all" onclick="setFilter('all')" style="cursor:pointer;" title="전체 보기">
        <div class="stat-num" style="color:var(--accent)" id="s-total">0</div><div class="stat-label">전체 재원</div>
      </div>
      <div class="stat-card stat-filter" id="sf-elem" onclick="setFilter('elem')" style="cursor:pointer;" title="초등부만 보기">
        <div class="stat-num" style="color:#7fb3ff" id="s-elem">0</div><div class="stat-label">초등부</div>
      </div>
      <div class="stat-card stat-filter" id="sf-mid" onclick="setFilter('mid')" style="cursor:pointer;" title="중등부만 보기">
        <div class="stat-num" style="color:var(--green)" id="s-mid">0</div><div class="stat-label">중등부</div>
      </div>
      <div class="stat-card stat-filter" id="sf-high" onclick="setFilter('high')" style="cursor:pointer;" title="고등부만 보기">
        <div class="stat-num" style="color:var(--orange)" id="s-high">0</div><div class="stat-label">고등부</div>
      </div>
      <div class="stat-card stat-filter" id="sf-disc" onclick="setFilter('disc')" style="cursor:pointer;" title="할인 적용 학생만 보기">
        <div class="stat-num" style="color:var(--red)" id="s-disc">0</div><div class="stat-label">할인 적용</div>
      </div>
    </div>

    <div class="flex" style="margin-bottom:14px;gap:10px;flex-wrap:wrap;">
      <button class="btn btn-green" onclick="openAddModal()">➕ 신규 등록</button>
      <button class="btn" style="background:rgba(247,212,79,0.15);color:var(--yellow);border:1px solid rgba(247,212,79,0.35);" onclick="openCompModal('elem')">🏆 경시 갱신 (초등)</button>
      <button class="btn" style="background:rgba(124,92,252,0.15);color:var(--purple);border:1px solid rgba(124,92,252,0.35);" onclick="openCompModal('mid-high')">⭐ 성적우수 갱신 (중·고등)</button>
      <input type="text" id="search-input" placeholder="🔍 이름·학교 검색" oninput="renderStudentTable()" style="max-width:220px;">
      <label style="font-size:13px;display:flex;align-items:center;gap:6px;color:var(--muted);margin-left:auto;">
        <input type="checkbox" id="show-withdrawn" onchange="renderStudentTable()" style="width:auto;accent-color:var(--accent)">퇴원생 보기
      </label>
    </div>

    <div class="card" style="padding:0;overflow:hidden;">
      <div style="overflow-x:auto;">
        <table class="stu-table">
          <thead>
            <tr>
              <th>#</th>
              <th>이름</th>
              <th>학교·학년</th>
              <th>반</th>
              <th>요일</th>
              <th>시간</th>
              <th>기본원비</th>
              <th>할인</th>

const DAYS_ALL = ['월','화','수','목','금','토','일'];
const DAYS_WD  = ['월','화','수','목','금'];
const COLOR_CLS = ['c0','c1','c2','c3','c4','c5','c6','c7','c8','c9','c10','c11','c12','c13','c14','c15'];

// Time slots: 15:00 ~ 22:00, 30-min intervals
const SLOTS = [];
for (let h = 15; h < 22; h++) {
  SLOTS.push(`${h}:00`);
  SLOTS.push(`${h}:30`);
}
SLOTS.push('22:00');

function timeToSlot(t) {
  const [h, m] = t.split(':').map(Number);
  return (h - 15) * 2 + (m >= 30 ? 1 : 0);
}

function getFriendDiscount(s) {
  if (!s.friend || !s.friendStart) return 0;
  const start = new Date(s.friendStart + '-01');
  const now = new Date();
  const months = (now.getFullYear() - start.getFullYear()) * 12 + (now.getMonth() - start.getMonth());
  return months < 3 ? s.friend : 0;
}

// 앱 시작 시 3개월 지난 친구소개 할인 자동 소멸
function expireFriendDiscounts() {
  let expired = [];
  students.forEach(s => {
    if (!s.friend || !s.friendStart) return;
    if (getFriendDiscount(s) === 0) {
      expired.push(s.name);
      s.friend = 0;
      s.friendStart = '';
      s.friendRef = '';
    }
  });
  if (expired.length > 0) {
    saveData();
    // 소멸 알림은 렌더 후 toast로
    setTimeout(() => toast(`⏰ 친구소개 할인 만료 : ${expired.join(', ')}`), 500);
  }
}

function getDiscount(s) {
  return (s.sibling || 0) + (s.competition || 0) + getFriendDiscount(s);
}

function getFinal(s) {
  return Math.max(0, (s.base || 0) - getDiscount(s));
}

function discountTags(s) {
  const tags = [];
  if (s.sibling)      tags.push(`<span class="tag tag-purple">형제 -${s.sibling.toLocaleString()}</span>`);
  if (s.competition) {
    const mo = s.competitionMonth || '';
    const isElem = s.grade.startsWith('초');
    const prefix = isElem ? '경시' : '성적우수';
    const label = mo
      ? `${prefix} -${s.competition.toLocaleString()} <span style="font-weight:400;opacity:.7">(${mo})</span>`
      : `${prefix} -${s.competition.toLocaleString()}`;
    tags.push(`<span class="tag tag-yellow">${label}</span>`);
  }
  const fd = getFriendDiscount(s);
  if (fd) {
    // 남은 개월 수 계산
    const start = new Date(s.friendStart + '-01');
    const now = new Date();
    const months = (now.getFullYear() - start.getFullYear()) * 12 + (now.getMonth() - start.getMonth());
    const remaining = 3 - months; // 1 or 2
    const warn = remaining === 1
      ? ` <span style="font-weight:400;color:var(--orange)">⚠️ 이번달 마지막</span>`
      : ` <span style="font-weight:400;opacity:.65">(${remaining}개월 남음)</span>`;
    tags.push(`<span class="tag tag-green">친구소개 -${fd.toLocaleString()}${warn}</span>`);
  }
  return tags.join(' ');
}

function formatTime(t) { return t || '—'; }

function getDaysSummary(s) {
  const activeDays = DAYS_ALL.filter(d => s.days && s.days[d]);
  return activeDays.join('');
}

function getTimeRange(s, day) {
  if (!s.days || !s.days[day]) return '';
  const {in: inn, out} = s.days[day];
  return `${inn}~${out}`;
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function switchTab(name, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
}

function closeModal(id) {
  document.getElementById(id).classList.add('hidden');
}

function updateHeaderStats() {
  const active = students.filter(s => !s.withdrawn);
  document.getElementById('h-total').textContent = active.length;
  document.getElementById('h-elem').textContent  = active.filter(s => s.grade.startsWith('초')).length;

}

// ═══════════════════════════════════════════════
// TIMETABLE
// ═══════════════════════════════════════════════
function renderTimetable() {
  const showAll = document.getElementById('show-all-days').checked;
  const days = showAll ? DAYS_ALL : DAYS_WD;
  const active = students.filter(s => !s.withdrawn);

  // Build color map per student
  const colorMap = {};
  active.forEach((s, i) => { colorMap[s.id] = COLOR_CLS[i % COLOR_CLS.length]; });

  // Build: slot[day][slotIdx] = [students]
  const grid = {};
  days.forEach(d => {
    grid[d] = {};
    SLOTS.forEach((_, si) => { grid[d][si] = []; });
  });

  active.forEach(s => {
    days.forEach(d => {
      if (!s.days || !s.days[d]) return;
      const {in: inn, out} = s.days[d];
      const startSlot = timeToSlot(inn);
      const endSlot   = timeToSlot(out);
      for (let si = startSlot; si < endSlot; si++) {
        if (grid[d][si] !== undefined) grid[d][si].push(s);
      }
    });
  });

  // Render table: rows = slots, cols = days
  let html = '<thead><tr>';
  html += '<th class="day-col" style="min-width:70px;font-size:11px;">시간</th>';
  days.forEach(d => { html += `<th>${d}요일</th>`; });
  html += '</tr></thead><tbody>';

  SLOTS.forEach((slot, si) => {
    const isHour = slot.endsWith(':00');
    html += `<tr style="${isHour ? 'border-top:1px solid rgba(255,255,255,0.08)' : ''}">`;
    html += `<td class="time-label" style="${isHour ? 'font-weight:700;color:var(--text)' : ''}">${slot}</td>`;

    days.forEach(d => {
      const stuList = grid[d][si];
      html += '<td>';
      if (stuList.length === 1) {
        const s = stuList[0];
        html += `<div class="stu-block ${colorMap[s.id]}" onclick="openDetailModal(${s.id})" title="${s.name} ${getTimeRange(s,d)}">${s.name}</div>`;
      } else if (stuList.length > 1) {
        html += '<div class="slot-stack">';
        stuList.forEach(s => {
          html += `<div class="stu-block ${colorMap[s.id]}" onclick="openDetailModal(${s.id})" title="${s.name}">${s.name}</div>`;
        });
        html += '</div>';
      }
      html += '</td>';
    });
    html += '</tr>';
  });

  html += '</tbody>';
  document.getElementById('timetable').innerHTML = html;

  // Legend
  let leg = '';
  active.forEach(s => {
    leg += `<div style="display:flex;align-items:center;gap:5px;cursor:pointer;" onclick="openDetailModal(${s.id})">
      <div class="${colorMap[s.id]}" style="width:14px;height:14px;border-radius:3px;flex-shrink:0;"></div>
      <span style="font-size:12px;">${s.name}</span>
    </div>`;
  });
  document.getElementById('legend').innerHTML = leg;
}

// STUDENT TABLE
// ═══════════════════════════════════════════════
let activeFilter = 'all';

function setFilter(f) {
  activeFilter = f;
  // 카드 active 표시
  ['all','elem','mid','high','disc'].forEach(k => {
    document.getElementById(`sf-${k}`)?.classList.toggle('active', k === f);
  });
  renderStudentTable();
}

function renderStudentTable() {
  const showWithdrawn = document.getElementById('show-withdrawn').checked;
  const q = document.getElementById('search-input').value.trim();
  const active = students.filter(s => {
    if (!showWithdrawn && s.withdrawn) return false;
    if (q && !s.name.includes(q) && !s.school.includes(q)) return false;
    if (activeFilter === 'elem' && !s.grade.startsWith('초')) return false;
    if (activeFilter === 'mid'  && !s.grade.startsWith('중')) return false;
    if (activeFilter === 'high' && !s.grade.startsWith('고')) return false;
    if (activeFilter === 'disc' && getDiscount(s) === 0) return false;
    return true;
  });

  const tbody = document.getElementById('stu-tbody');
  tbody.innerHTML = active.map(s => {
    const dayStr = DAYS_ALL.map(d =>
      `<div class="day-tag ${s.days && s.days[d] ? 'day-on' : 'day-off'}">${d}</div>`
    ).join('');

    const timeStr = DAYS_ALL.filter(d => s.days && s.days[d])
      .map(d => `<div style="font-size:11px;color:var(--muted);white-space:nowrap">${d} ${s.days[d].in}~${s.days[d].out}</div>`)
      .join('');

    const disc = discountTags(s);
    const final = getFinal(s);
    const status = s.withdrawn
      ? `<span class="tag tag-red">퇴원</span>`
      : `<span class="tag tag-green">재원</span>`;

    const actions = s.withdrawn
      ? `<button class="btn btn-ghost btn-sm" onclick="reEnroll(${s.id})">재등록</button>`
      : `<button class="btn btn-ghost btn-sm" onclick="openEditModal(${s.id})">수정</button>
         <button class="btn btn-sm" style="background:rgba(247,95,95,0.12);color:var(--red);border:1px solid rgba(247,95,95,0.3)" onclick="openWithdrawModal(${s.id})">퇴원</button>`;

    return `<tr class="${s.withdrawn ? 'withdrawn' : ''}">
      <td style="color:var(--muted);font-family:'DM Mono',monospace;font-size:12px">${s.id}</td>
      <td><strong style="cursor:pointer;color:var(--accent)" onclick="openDetailModal(${s.id})">${s.name}</strong></td>
      <td style="color:var(--muted)">${s.school} · ${s.grade}</td>
      <td><span class="tag tag-blue">${s.cls}</span></td>
      <td><div class="days-cell">${dayStr}</div></td>
      <td><div style="display:flex;flex-direction:column;gap:2px">${timeStr}</div></td>
      <td style="font-family:'DM Mono',monospace">${(s.base||0).toLocaleString()}</td>
      <td>${disc || '<span style="color:var(--muted)">—</span>'}</td>
      <td style="font-weight:700;color:var(--accent);font-family:'DM Mono',monospace">${final.toLocaleString()}원</td>
      <td style="color:var(--muted)">${s.textbook ? s.textbook.toLocaleString()+'원' : '—'}</td>
      <td>${status}</td>
      <td><div class="flex" style="gap:4px;flex-wrap:wrap">${actions}</div></td>
    </tr>`;
  }).join('');

  // Update stats
  const act = students.filter(s => !s.withdrawn);
  document.getElementById('s-total').textContent = act.length;
  document.getElementById('s-elem').textContent  = act.filter(s => s.grade.startsWith('초')).length;
  document.getElementById('s-mid').textContent   = act.filter(s => s.grade.startsWith('중')).length;
  document.getElementById('s-high').textContent  = act.filter(s => s.grade.startsWith('고')).length;
  document.getElementById('s-disc').textContent  = act.filter(s => getDiscount(s) > 0).length;
  updateHeaderStats();
}

function openDetailModal(id) {
  const s = students.find(st => st.id === id);
  if (!s) return;

  document.getElementById('modal-title-text').textContent = `👤 ${s.name}`;

  const fd = getFriendDiscount(s);
  const discTotal = getDiscount(s);
  const final = getFinal(s);

  const scheduleRows = DAYS_ALL.filter(d => s.days && s.days[d]).map(d =>
    `<div class="detail-row">
      <span class="detail-label">${d}요일</span>
      <span class="detail-value">${s.days[d].in} ~ ${s.days[d].out}</span>
    </div>`
  ).join('');

  document.getElementById('modal-body').innerHTML = `
    <div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap">
      <span class="tag tag-blue">${s.grade}</span>
      <span class="tag tag-blue">${s.cls}</span>
      <span class="tag ${s.withdrawn ? 'tag-red' : 'tag-green'}">${s.withdrawn ? '퇴원' : '재원중'}</span>
    </div>
    <div class="detail-row"><span class="detail-label">학교</span><span class="detail-value">${s.school}</span></div>
    <div style="margin:12px 0 8px;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em">수업 일정</div>
    ${scheduleRows}
    <div style="margin:12px 0 8px;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em">원비</div>
    <div class="detail-row"><span class="detail-label">기본 원비</span><span class="detail-value">${(s.base||0).toLocaleString()}원</span></div>
    ${s.sibling ? `<div class="detail-row"><span class="detail-label">형제 할인</span><span class="detail-value" style="color:var(--purple)">-${s.sibling.toLocaleString()}원 (재원 기간 내내)</span></div>` : ''}
    ${s.competition ? `<div class="detail-row"><span class="detail-label">경시대회 할인</span><span class="detail-value" style="color:var(--yellow)">-${s.competition.toLocaleString()}원</span></div>` : ''}
    ${s.friend ? (() => {
      if (fd === 0) return '';
      const start2 = new Date(s.friendStart + '-01');
      const now2 = new Date();
      const mo2 = (now2.getFullYear() - start2.getFullYear()) * 12 + (now2.getMonth() - start2.getMonth());
      const rem = 3 - mo2;
      const remStr = rem === 1 ? '<span style="color:var(--orange)"> ⚠️ 이번달 마지막</span>' : ` (${rem}개월 남음)`;
      return `<div class="detail-row"><span class="detail-label">친구 소개 할인</span><span class="detail-value" style="color:var(--green)">-${fd.toLocaleString()}원${remStr} · ${s.friendRef||''}</span></div>`;
    })() : ''}
    ${discTotal ? `<div class="detail-row"><span class="detail-label">총 할인</span><span class="detail-value" style="color:var(--red)">-${discTotal.toLocaleString()}원</span></div>` : ''}
    <div class="detail-row" style="border-top:2px solid var(--border);margin-top:4px;">
      <span class="detail-label" style="font-weight:700;color:var(--text)">최종 원비</span>
      <span class="detail-value" style="font-size:18px;color:var(--accent)">${final.toLocaleString()}원</span>
    </div>
    ${s.textbook ? `<div class="detail-row"><span class="detail-label">교재비</span><span class="detail-value">${s.textbook.toLocaleString()}원</span></div>` : ''}
    ${s.note ? `<div class="detail-row"><span class="detail-label">비고</span><span class="detail-value" style="color:var(--orange)">${s.note}</span></div>` : ''}
  `;

  document.getElementById('modal-actions').innerHTML = s.withdrawn
    ? `<button class="btn btn-ghost" onclick="reEnroll(${s.id});closeModal('modal-detail')">재등록</button>`
    : `<button class="btn btn-ghost" onclick="closeModal('modal-detail');openEditModal(${s.id})">수정</button>
       <button class="btn btn-red" onclick="closeModal('modal-detail');openWithdrawModal(${s.id})">퇴원 처리</button>`;

  document.getElementById('modal-detail').classList.remove('hidden');
}

// 등원 시간 슬롯 인덱스 + 5 (2시간30분 = 5슬롯) → 하원 기본값
function calcDefaultOut(inTime) {
  const idx = SLOTS.indexOf(inTime);
  const outIdx = Math.min(idx + 5, SLOTS.length - 1);
  return SLOTS[outIdx];
}

function buildDayInputs(daysData) {
  const html = DAYS_ALL.map(d => {
    const has = daysData && daysData[d];
    const inn = has ? daysData[d].in  : '16:00';
    const out = has ? daysData[d].out : calcDefaultOut(inn);
    const times = SLOTS.filter(s => s !== '22:00');

    const inOpts  = times.map(t => `<option value="${t}" ${inn===t?'selected':''}>${t}</option>`).join('');
    const outOpts = SLOTS.filter(s => s !== '15:00').map(t => `<option value="${t}" ${out===t?'selected':''}>${t}</option>`).join('');

    return `<div class="day-row" id="drow-${d}">
      <div class="day-name ${has ? 'active' : ''}">${d}요일</div>
      <select style="border-left:1px solid var(--border);border-radius:0;" id="din-${d}" ${has?'':'disabled'}
        onchange="autoSetOut('${d}')">${inOpts}</select>
      <select style="border-left:1px solid var(--border);border-radius:0;" id="dout-${d}" ${has?'':'disabled'}>${outOpts}</select>
      <div class="day-check"><input type="checkbox" id="dchk-${d}" ${has?'checked':''} onchange="toggleDay('${d}')"></div>
    </div>`;
  }).join('');
  return html;
}

// 등원 시간 바꾸면 하원을 +2:30으로 자동 세팅 (이미 저장된 데이터 수정 시엔 그대로 유지)
function autoSetOut(d) {
  const inSel  = document.getElementById(`din-${d}`);
  const outSel = document.getElementById(`dout-${d}`);
  if (!inSel || !outSel) return;
  const newOut = calcDefaultOut(inSel.value);
  outSel.value = newOut;
}

function toggleDay(d) {
  const chk = document.getElementById(`dchk-${d}`).checked;
  const inSel  = document.getElementById(`din-${d}`);
  const outSel = document.getElementById(`dout-${d}`);
  inSel.disabled  = !chk;
  outSel.disabled = !chk;
  const label = document.querySelector(`#drow-${d} .day-name`);
  if (label) { chk ? label.classList.add('active') : label.classList.remove('active'); }
  if (chk) { outSel.value = calcDefaultOut(inSel.value); }
}

function openAddModal() {
  document.getElementById('form-title').textContent = '신규 학생 등록';
  document.getElementById('f-edit-id').value = '';
  ['f-name','f-school','f-note','f-friend-start','f-friend-ref'].forEach(id => document.getElementById(id).value = '');
  ['f-grade','f-class'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('f-base').value = '';
  document.getElementById('f-sibling').value = '0';
  document.getElementById('f-competition').value = '0';
  document.getElementById('f-friend').value = '0';
  document.getElementById('f-textbook').value = '0';
  document.getElementById('f-final-display').textContent = '—';
  document.getElementById('day-schedule-inputs').innerHTML = buildDayInputs(null);
  document.getElementById('modal-form').classList.remove('hidden');
}

function openEditModal(id) {
  const s = students.find(st => st.id === id);
  if (!s) return;
  document.getElementById('form-title').textContent = `수정 — ${s.name}`;
  document.getElementById('f-edit-id').value = id;
  document.getElementById('f-name').value  = s.name;
  document.getElementById('f-school').value = s.school;
  document.getElementById('f-grade').value  = s.grade;
  document.getElementById('f-class').value  = s.cls;
  document.getElementById('f-base').value   = s.base;
  document.getElementById('f-sibling').value = s.sibling || 0;
  document.getElementById('f-competition').value = s.competition || 0;
  document.getElementById('f-friend').value  = s.friend || 0;
  document.getElementById('f-friend-start').value = s.friendStart || '';
  document.getElementById('f-friend-ref').value   = s.friendRef || '';
  document.getElementById('f-textbook').value = s.textbook || 0;
  document.getElementById('f-note').value    = s.note || '';
  document.getElementById('day-schedule-inputs').innerHTML = buildDayInputs(s.days);
  calcDiscount();
  document.getElementById('modal-form').classList.remove('hidden');
}

function autoPrice() {
  const map = {'초등 2회':180000,'초등 3회':260000,'중등 3회':360000,'고등 3회':475000};
  const v = map[document.getElementById('f-class').value];
  if (v) { document.getElementById('f-base').value = v; calcDiscount(); }
}

function calcDiscount() {
  const base = parseInt(document.getElementById('f-base').value) || 0;
  const sib  = parseInt(document.getElementById('f-sibling').value) || 0;
  const comp = parseInt(document.getElementById('f-competition').value) || 0;
  const fr   = parseInt(document.getElementById('f-friend').value) || 0;
  const final = Math.max(0, base - sib - comp - fr);
  document.getElementById('f-final-display').textContent = final.toLocaleString() + '원';
}

function getDaysFromForm() {
  const days = {};
  DAYS_ALL.forEach(d => {
    if (document.getElementById(`dchk-${d}`)?.checked) {
      days[d] = {
        in:  document.getElementById(`din-${d}`).value,
        out: document.getElementById(`dout-${d}`).value,
      };
    }
  });
  return days;
}

function saveStudent() {
  const name  = document.getElementById('f-name').value.trim();
  const school = document.getElementById('f-school').value.trim();
  const grade  = document.getElementById('f-grade').value;
  const cls    = document.getElementById('f-class').value;
  const base   = parseInt(document.getElementById('f-base').value) || 0;
  if (!name || !school || !grade || !cls || !base) { toast('⚠️ 필수 항목을 입력해주세요'); return; }

  const days = getDaysFromForm();
  if (Object.keys(days).length === 0) { toast('⚠️ 최소 하나의 요일을 선택해주세요'); return; }

  const data = {
    name, school, grade, cls, base,
    days,
    sibling:     parseInt(document.getElementById('f-sibling').value) || 0,
    competition: parseInt(document.getElementById('f-competition').value) || 0,
    friend:      parseInt(document.getElementById('f-friend').value) || 0,
    friendStart: document.getElementById('f-friend-start').value,
    friendRef:   document.getElementById('f-friend-ref').value.trim(),
    textbook:    parseInt(document.getElementById('f-textbook').value) || 0,
    note:        document.getElementById('f-note').value.trim(),
    withdrawn:   false,
  };

  const editId = parseInt(document.getElementById('f-edit-id').value);
  if (editId) {
    const idx = students.findIndex(s => s.id === editId);
    if (idx >= 0) { students[idx] = {...students[idx], ...data}; }
  } else {
    const newId = Math.max(0, ...students.map(s => s.id)) + 1;
    students.push({id: newId, ...data});
  }

  saveData();
  renderAll();
  closeModal('modal-form');
  toast(`✅ ${name} 학생 정보가 저장되었습니다`);
}


// ═══════════════════════════════════════════════
// 경시대회 할인 월별 갱신 (전체 학생)
// ═══════════════════════════════════════════════
let _compMode = 'elem'; // 'elem' | 'mid-high'

function openCompModal(mode) {
  _compMode = mode;
  const isElem = mode === 'elem';

  document.getElementById('comp-modal-title').textContent =
    isElem ? '🏆 경시대회 할인 갱신 (초등부)' : '⭐ 성적우수자 할인 갱신 (중·고등부)';
  document.getElementById('comp-desc').textContent =
    isElem
      ? '이번 달 경시대회 수상 결과를 입력하세요. 초등부 학생만 표시됩니다.'
      : '이번 달 성적우수자 할인을 입력하세요. 중·고등부 학생만 표시됩니다.';

  const now = new Date();
  const ym = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  document.getElementById('comp-month').value = ym;

  renderCompRows();
  updateCompPreview();

  document.getElementById('comp-month').oninput = () => updateCompPreview();
  document.getElementById('modal-comp').classList.remove('hidden');
}

function renderCompRows() {
  const isElem = _compMode === 'elem';
  const filtered = students.filter(s => {
    if (s.withdrawn) return false;
    return isElem ? s.grade.startsWith('초') : (s.grade.startsWith('중') || s.grade.startsWith('고'));
  });

  if (filtered.length === 0) {
    document.getElementById('comp-rows').innerHTML =
      '<div style="padding:20px;text-align:center;color:var(--muted)">해당 학생이 없습니다.</div>';
    return;
  }

  const rows = filtered.map(s => {
    const cur = s.competition || 0;
    const opts = isElem
      ? `<option value="0"    ${cur===0    ?'selected':''}>없음</option>
         <option value="5000" ${cur===5000 ?'selected':''}>은상·동상 — -5,000원</option>
         <option value="10000"${cur===10000?'selected':''}>금상·대상 — -10,000원</option>`
      : `<option value="0"    ${cur===0    ?'selected':''}>없음</option>
         <option value="5000" ${cur===5000 ?'selected':''}>우수 — -5,000원</option>
         <option value="10000"${cur===10000?'selected':''}>최우수 — -10,000원</option>`;

    return `<div style="display:grid;grid-template-columns:1fr 1fr 1fr;align-items:center;padding:9px 14px;border-bottom:1px solid rgba(42,47,62,0.4);">
      <div style="font-weight:600">${s.name}</div>
      <div style="font-size:12px;color:var(--muted)">${s.grade}</div>
      <select id="camt-${s.id}" onchange="updateCompPreview()"
        style="background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:5px 8px;font-size:12px;color:var(--text);font-family:inherit;">
        ${opts}
      </select>
    </div>`;
  }).join('');
  document.getElementById('comp-rows').innerHTML = rows;
}

function updateCompPreview() {
  const active = students.filter(s => !s.withdrawn);
  let count = 0, total = 0;
  active.forEach(s => {
    const el = document.getElementById(`camt-${s.id}`);
    if (!el) return;
    const amt = parseInt(el.value) || 0;
    if (amt > 0) { count++; total += amt; }
  });
  const prev = document.getElementById('comp-preview');
  prev.innerHTML = count
    ? `이번 달 경시 할인 적용 <strong style="color:var(--yellow)">${count}명</strong> · 총 할인 <strong style="color:var(--yellow)">-${total.toLocaleString()}원</strong>`
    : `<span style="color:var(--muted)">이번 달 경시 할인 대상 없음</span>`;
}

function saveCompDiscount() {
  const mo = document.getElementById('comp-month').value;
  if (!mo) { toast('⚠️ 적용 월을 선택해주세요'); return; }
  const active = students.filter(s => !s.withdrawn);
  let count = 0;
  active.forEach(s => {
    const el = document.getElementById(`camt-${s.id}`);
    if (!el) return;
    const amt = parseInt(el.value) || 0;
    s.competition = amt;
    s.competitionMonth = amt ? mo : '';
    if (amt > 0) count++;
  });
  saveData();
  renderStudentTable();
  closeModal('modal-comp');
  const label = _compMode === 'elem' ? '경시 할인' : '성적우수 할인';
  toast(`✅ ${mo} ${label} 갱신 완료 — ${count}명 적용`);
}

// ═══════════════════════════════════════════════
// WITHDRAW / RE-ENROLL
// ═══════════════════════════════════════════════
let _withdrawId = null;

function openWithdrawModal(id) {
  const s = students.find(st => st.id === id);
  if (!s) return;
  _withdrawId = id;
  document.getElementById('withdraw-desc').textContent = `${s.name} (${s.grade} · ${s.cls}) 학생을 퇴원 처리합니다. 기록은 보존됩니다.`;
  document.getElementById('withdraw-date').value = new Date().toISOString().split('T')[0];
  document.getElementById('withdraw-reason').value = '';
  document.getElementById('modal-withdraw').classList.remove('hidden');
}

function confirmWithdraw() {
  const s = students.find(st => st.id === _withdrawId);
  if (!s) return;
  s.withdrawn = true;
  s.withdrawDate = document.getElementById('withdraw-date').value;
  s.withdrawReason = document.getElementById('withdraw-reason').value;
  saveData();
  renderAll();
  closeModal('modal-withdraw');
  toast(`🚪 ${s.name} 학생이 퇴원 처리되었습니다`);
}

function reEnroll(id) {
  const s = students.find(st => st.id === id);
  if (!s) return;
  if (!confirm(`${s.name} 학생을 재등록 처리할까요?`)) return;
  s.withdrawn = false;
  delete s.withdrawDate;
  delete s.withdrawReason;
  saveData();
  renderAll();
  toast(`✅ ${s.name} 학생이 재등록되었습니다`);
}


// ═══════════════════════════════════════════════
// ATTENDANCE
// ═══════════════════════════════════════════════
// 출결 데이터 구조: attendance[YYYY-MM-DD][studentId] = 'present'|'absent'|'makeup'|'early'|'none'
const ATT_STATES  = ['present','absent','makeup','early','none'];
const ATT_LABELS  = {present:'출석', absent:'결석', makeup:'보충', early:'조퇴', none:'미정'};
const ATT_CLS     = {present:'att-present', absent:'att-absent', makeup:'att-makeup', early:'att-early', none:'att-none'};

function loadAttendance() {
  try { return JSON.parse(localStorage.getItem('luche_att_v1') || '{}'); } catch(e) { return {}; }
}
function saveAttendance(data) {
  localStorage.setItem('luche_att_v1', JSON.stringify(data));
}

function setAttToday() {
  const today = new Date();
  const ymd = today.toISOString().split('T')[0];
  document.getElementById('att-date').value = ymd;
  renderAttendance();
}

function getAttDate() {
  return document.getElementById('att-date').value;
}

function getDayOfWeek(ymd) {
  const days = ['일','월','화','수','목','금','토'];
  return days[new Date(ymd).getDay()];
}

// 해당 날짜 요일에 수업 있는 학생만 반환
function getStudentsForDate(ymd) {
  const dow = getDayOfWeek(ymd);
  return students.filter(s => !s.withdrawn && s.days && s.days[dow]);
}

function cycleStatus(current) {
  const idx = ATT_STATES.indexOf(current);
  return ATT_STATES[(idx + 1) % ATT_STATES.length];
}

function toggleAtt(ymd, sid) {
  const att = loadAttendance();
  if (!att[ymd]) att[ymd] = {};
  const cur = att[ymd][sid] || 'none';
  att[ymd][sid] = cycleStatus(cur);
  saveAttendance(att);
  renderAttendance();
}

function setAtt(ymd, sid, status) {
  const att = loadAttendance();
  if (!att[ymd]) att[ymd] = {};
  att[ymd][sid] = status;
  saveAttendance(att);
  renderAttendance();
}

function renderAttendance() {
  const ymd = getAttDate();
  if (!ymd) return;

  const dow = getDayOfWeek(ymd);
  const todayStudents = getStudentsForDate(ymd);
  const att = loadAttendance();
  const dayAtt = att[ymd] || {};

  const noClass = `<tr><td colspan="20" style="text-align:center;padding:40px;color:var(--muted)">${ymd} (${dow}요일) 수업 학생이 없습니다.</td></tr>`;

  if (todayStudents.length === 0) {
    document.getElementById('att-table').innerHTML = noClass;
    document.getElementById('att-checklist').innerHTML = '<div style="padding:20px;text-align:center;color:var(--muted);font-size:13px;">수업 학생 없음</div>';
    document.getElementById('att-summary').innerHTML = '';
    document.getElementById('att-absent-list').innerHTML = '';
    return;
  }

  // 색상 맵
  const active = students.filter(s => !s.withdrawn);
  const colorMap = {};
  active.forEach((s, i) => { colorMap[s.id] = COLOR_CLS[i % COLOR_CLS.length]; });

  // 슬롯별 배치
  const grid = {};
  SLOTS.forEach((_, si) => { grid[si] = []; });
  todayStudents.forEach(s => {
    const sched = s.days[dow];
    const start = timeToSlot(sched.in);
    const end   = timeToSlot(sched.out);
    for (let si = start; si < end; si++) {
      if (grid[si] !== undefined) grid[si].push(s);
    }
  });

  // ── 타임테이블
  const dateStr = new Date(ymd + 'T00:00:00').toLocaleDateString('ko-KR', {month:'long', day:'numeric'});
  let html = `<thead><tr>
    <th class="day-col" style="min-width:68px;font-size:11px;">시간</th>
    <th style="text-align:left;padding-left:12px;">${dateStr} ${dow}요일 · ${todayStudents.length}명</th>
  </tr></thead><tbody>`;

  SLOTS.forEach((slot, si) => {
    const isHour = slot.endsWith(':00');
    const stuList = grid[si];
    html += `<tr style="${isHour ? 'border-top:1px solid rgba(255,255,255,0.08)' : ''}">`;
    html += `<td class="time-label" style="${isHour ? 'font-weight:700;color:var(--text)' : ''}">${slot}</td>`;
    html += `<td style="padding:2px 6px;">`;
    if (stuList.length > 0) {
      html += `<div style="display:flex;gap:3px;flex-wrap:wrap;">`;
      stuList.forEach(s => {
        const status = dayAtt[s.id] || 'none';
        const cls    = ATT_CLS[status];
        const label  = ATT_LABELS[status];
        html += `<div class="att-block ${cls}"
          title="${s.name} (${label})"
          style="position:relative;inset:auto;width:58px;height:42px;">
          <span class="att-name">${s.name}</span>
          <span class="att-badge">${label}</span>
        </div>`;
      });
      html += `</div>`;
    }
    html += `</td></tr>`;
  });
  html += '</tbody>';
  document.getElementById('att-table').innerHTML = html;

  // ── 체크리스트 (시간순 정렬)
  const sorted = [...todayStudents].sort((a, b) => {
    const ta = a.days[dow].in, tb = b.days[dow].in;
    return ta < tb ? -1 : ta > tb ? 1 : 0;
  });

  const checkRows = sorted.map(s => {
    const status = dayAtt[s.id] || 'none';
    const cls    = ATT_CLS[status];
    const label  = ATT_LABELS[status];
    const sched  = s.days[dow];
    return `<div style="display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid rgba(42,47,62,0.4);transition:background .15s;"
      onmouseover="this.style.background='rgba(79,142,247,0.05)'" onmouseout="this.style.background=''">
      <div style="flex:1;min-width:0;">
        <div style="font-weight:700;font-size:13px;">${s.name}</div>
        <div style="font-size:11px;color:var(--muted);">${s.grade} · ${sched.in}~${sched.out}</div>
      </div>
      <div style="display:flex;gap:4px;flex-shrink:0;">
        ${['present','absent','makeup','early'].map(st =>
          `<button onclick="setAtt('${ymd}',${s.id},'${st}')"
            style="padding:4px 7px;border-radius:6px;border:1px solid;font-size:10px;font-weight:700;cursor:pointer;transition:all .15s;
              ${status === st
                ? `background:${st==='present'?'rgba(62,207,142,0.3)':st==='absent'?'rgba(247,95,95,0.3)':st==='makeup'?'rgba(79,142,247,0.3)':'rgba(247,147,79,0.3)'};color:${st==='present'?'var(--green)':st==='absent'?'var(--red)':st==='makeup'?'var(--accent)':'var(--orange)'};border-color:${st==='present'?'var(--green)':st==='absent'?'var(--red)':st==='makeup'?'var(--accent)':'var(--orange)'};`
                : 'background:transparent;color:var(--muted);border-color:var(--border);'}"
          >${ATT_LABELS[st]}</button>`
        ).join('')}
      </div>
    </div>`;
  }).join('');

  document.getElementById('att-checklist').innerHTML = checkRows ||
    '<div style="padding:20px;text-align:center;color:var(--muted)">학생 없음</div>';

  // ── 요약
  const counts = {present:0, absent:0, makeup:0, early:0, none:0};
  todayStudents.forEach(s => { counts[dayAtt[s.id] || 'none']++; });
  const summaryColors = {present:'var(--green)', absent:'var(--red)', makeup:'var(--accent)', early:'var(--orange)', none:'var(--muted)'};
  document.getElementById('att-summary').innerHTML = ATT_STATES
    .filter(st => counts[st] > 0)
    .map(st => `<div class="att-sum-item">
      <span class="att-sum-num" style="color:${summaryColors[st]}">${counts[st]}</span>
      <span style="color:var(--muted);font-size:12px">${ATT_LABELS[st]}</span>
    </div>`).join('');

  // ── 결석·보충 요약 카드
  const notPresent = todayStudents.filter(s => ['absent','makeup','early'].includes(dayAtt[s.id]));
  if (notPresent.length > 0) {
    document.getElementById('att-absent-list').innerHTML = `
      <div class="card mt16">
        <div class="card-title"><span class="dot" style="background:var(--red)"></span> 특이 사항</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;">
          ${notPresent.map(s => {
            const st = dayAtt[s.id];
            const col = st==='absent'?'var(--red)':st==='makeup'?'var(--accent)':'var(--orange)';
            return `<div style="background:rgba(255,255,255,0.04);border:1px solid ${col}44;border-left:3px solid ${col};border-radius:8px;padding:8px 14px;">
              <div style="font-weight:700;font-size:13px;">${s.name} <span style="color:${col};font-size:11px;">${ATT_LABELS[st]}</span></div>
              <div style="font-size:11px;color:var(--muted)">${s.grade} · ${s.days[dow].in}~${s.days[dow].out}</div>
            </div>`;
          }).join('')}
        </div>
      </div>`;
  } else {
    document.getElementById('att-absent-list').innerHTML = '';
  }
}

  renderTimetable();
  renderStudentTable();
